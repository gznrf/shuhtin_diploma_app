services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-diplom_root}
      MYSQL_DATABASE: diplom
      MYSQL_USER: diplom
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-diplom_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: mysql://diplom:${MYSQL_PASSWORD:-diplom_pass}@db:3306/diplom
      JWT_SECRET: ${JWT_SECRET:-diplom_jwt_change_me}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build: .
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
